name: 01 - Building Blocks
description: This is a collection of building blocks that can be used to create workflows in GitHub Actions. |
             Each building block is a reusable component that can be combined with other blocks |
             to create complex workflows.  
on:
  push:
jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello, World!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Failed step
        run: |
          echo "This step (I) will fail"
          exit 1
      - name: Say Goodbye
        run: echo "Goodbye, World!"
